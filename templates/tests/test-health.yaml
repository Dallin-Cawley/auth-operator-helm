apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "auth-operator.fullname" . }}-test-health"
  labels:
    {{- include "auth-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['sh', '-c', 'wget -qO- http://{{ include "auth-operator.fullname" . }}:{{ .Values.service.port }}/healthz && wget -qO- http://{{ include "auth-operator.fullname" . }}:{{ .Values.service.port }}/readyz']
  restartPolicy: Never
