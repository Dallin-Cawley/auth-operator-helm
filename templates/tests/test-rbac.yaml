apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "auth-operator.fullname" . }}-test-rbac"
  labels:
    {{ include "auth-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: {{ .Values.kubeAPI.operator.serviceAccount.name }}
  containers:
    - name: kubectl
      image: bitnami/kubectl:latest
      command:
        - /bin/bash
        - -c
        - |
          # Check if operator can manage clientcredentials
          kubectl auth can-i create clientcredentials.auth.championtourney.com && \
          kubectl auth can-i delete clientcredentials.auth.championtourney.com && \
          kubectl auth can-i watch clientcredentials.auth.championtourney.com && \
          kubectl auth can-i list clientcredentials.auth.championtourney.com && \
          kubectl auth can-i get clientcredentials.auth.championtourney.com && \

          # Check if operator can manage serviceaccounts
          kubectl auth can-i create serviceaccounts && \
          kubectl auth can-i delete serviceaccounts
  restartPolicy: Never
