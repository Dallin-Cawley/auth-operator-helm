apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "auth-operator.fullname" . }}-test-connection"
  labels:
    {{- include "auth-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['http://{{ include "auth-operator.fullname" . }}:{{ .Values.service.port }}/healthz']
  restartPolicy: Never
