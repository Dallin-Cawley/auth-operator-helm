{{- if .Values.kubeAPI.operator.role.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.kubeAPI.operator.role.name }}
  labels:
    {{- include "auth-operator.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.kubeAPI.operator.role.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.kubeAPI.operator.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
