{{- if .Values.kubeAPI.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.kubeAPI.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.kubeAPI.serviceAccount.annotations }}
  annotations:
    {{ toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
