{{- if and .Values.kubeAPI.operator.clusterRole.enabled .Values.store.openbao.proxy.authMethod.openBaoUsesSelfJwtReviewer}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .Values.kubeAPI.operator.clusterRole.name }}-auth-delegator"
  labels:
    {{- include "auth-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "system:auth-delegator"
subjects:
  - kind: ServiceAccount
    name: {{ .Values.kubeAPI.operator.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}