{{- if .Values.kubeAPI.apiAuth.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.kubeAPI.apiAuth.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-auth
  {{- with .Values.kubeAPI.apiAuth.serviceAccount.annotations }}
  annotations:
    {{ toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
