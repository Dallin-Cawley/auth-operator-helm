# Default values for auth-operator.

service:
  serviceType: ClusterIP
  port: 8081

image:
  operator:
    pullPolicy: IfNotPresent
    tag: 1.0.35

  apiAuth:
    pullPolicy: IfNotPresent
    tag: 1.0.5

store:
  openbao:
    enabled: true
    vaultADDR: https://openbao-release.openbao-system.svc.cluster.local:8200
    kv2MountPath: kv
    masterSecretPath: client-credentials
    transitMountPath: transit
    transitSigningKey: api-auth-signing-key

    tls:
      selfSigned: true
      secretName: internal-openbao-cert
      caCertKey: ca.crt
      tlsCertKey: tls.crt
      tlsKeyKey: tls.key

    proxy:
      image:
        tag: 1.0.14-alpine3.23-openbao_proxy2.5

      authMethod:
        openBaoUsesSelfJwtReviewer: true

        operator:
          token:
            enabled: false
            secret:
              name: openbao-token
              key: token

          kubernetes:
            enabled: true
            role: auth-operator

        apiAuth:
          token:
            enabled: false
            secret:
              name: openbao-token
              key: token

          kubernetes:
            enabled: true
            role: auth-operator-api-auth

kubeAPI:
  operator:
    clusterRole:
      enabled: true
      name: auth-operator-cluster-role

    role:
      enabled: false
      name: auth-operator-role

    serviceAccount:
      create: true
      name: auth-operator
      annotations: { }

  apiAuth:
    clusterRole:
      enabled: true
      name: api-auth-cluster-role

    role:
      enabled: false
      name: api-auth-role

    serviceAccount:
      create: true
      name: auth-operator-api-auth
      annotations: { }

probe:
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
